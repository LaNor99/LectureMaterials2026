<html lang="en">
<head>
    <title>Yarn Basket</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<h1>Yarn Basket</h1>

<div>

    <div>
        <label for="nameInput">Name:</label><br>
        <input id="nameInput" placeholder="Name" required>
    </div>

    <div>
        <label for="colorInput">Color:</label><br>
        <input id="colorInput" placeholder="Color" required>
    </div>

    <div>
        <label for="lengthInput">Length (meters):</label><br>
        <input id="lengthInput" type="number" step="0.01" placeholder="Length" required>
    </div>

    <div>
        <label for="washableInput">Washable:</label><br>
        <input id="washableInput" type="checkbox">
    </div>

    <button id="addBtn">Add Yarn</button>

</div>

<h2>All Yarns</h2>
<ul id="yarnList"></ul>

</body>
</html>
